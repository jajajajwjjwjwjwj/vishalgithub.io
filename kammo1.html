<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kammo Memories 💖</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(to bottom,#170022,#32004f,#090010);
      color:white;
      position:relative;
    }

    /* STARS */

    body::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      background:url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity:0.35;
      animation:stars 70s linear infinite;
    }

    @keyframes stars{

      from{
        transform:translateY(0);
      }

      to{
        transform:translateY(-1000px);
      }

    }

    .container{
      width:90%;
      max-width:700px;
      text-align:center;
      position:relative;
      z-index:5;
    }

    /* PHOTO */

    .kammo{

      width:260px;
      border-radius:25px;

      opacity:0;

      transform:
      translateX(-500px)
      scale(0.7);

      animation:entry 3s ease forwards;

      box-shadow:
      0 0 25px #ff7be9,
      0 0 60px #ffb0f7;

    }

    @keyframes entry{

      0%{
        opacity:0;

        transform:
        translateX(-500px)
        scale(0.7)
        rotate(-10deg);
      }

      60%{
        opacity:1;

        transform:
        translateX(20px)
        scale(1.03)
        rotate(3deg);
      }

      100%{
        opacity:1;

        transform:
        translateX(0px)
        scale(1)
        rotate(0deg);
      }

    }

    h1{

      margin-top:25px;

      font-size:38px;

      line-height:1.6;

      background:
      linear-gradient(to right,#ff95e8,#ffffff,#ffb7f7);

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:2.5s;

    }

    p{

      margin-top:18px;

      font-size:18px;

      color:#f5dfff;

      line-height:1.8;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:3s;

    }

    @keyframes fade{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    .btn{

      display:inline-block;

      margin-top:35px;

      padding:15px 40px;

      border-radius:50px;

      text-decoration:none;

      color:white;

      font-size:18px;

      background:
      linear-gradient(45deg,#ff4fd8,#ff9cf4);

      box-shadow:
      0 0 20px #ff7ce9;

      transition:0.4s;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:3.7s;

    }

    .btn:hover{

      transform:scale(1.1);

      box-shadow:
      0 0 40px #ffb7f8;

    }

    /* FLOWERS */

    .flower{
      position:absolute;
      font-size:25px;
      animation:fall 12s linear infinite;
      opacity:0.8;
    }

    @keyframes fall{

      from{
        transform:translateY(-100px) rotate(0deg);
      }

      to{
        transform:translateY(120vh) rotate(360deg);
      }

    }

  </style>

</head>

<body>

  <!-- FLOWERS -->

  <div class="flower" style="left:5%; animation-delay:0s;">🌸</div>
  <div class="flower" style="left:18%; animation-delay:2s;">🌺</div>
  <div class="flower" style="left:30%; animation-delay:4s;">💮</div>
  <div class="flower" style="left:50%; animation-delay:1s;">🌸</div>
  <div class="flower" style="left:68%; animation-delay:3s;">🌺</div>
  <div class="flower" style="left:85%; animation-delay:5s;">💮</div>

    </h1>

  </div>

</html>
