<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kammo Jaan 💖</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#060010,#14002c,#220046);
      position:relative;
      color:white;
    }







    /* ========================= */
/* MOBILE RESPONSIVE DESIGN */
/* ========================= */

@media(max-width:480px){

  body{
    overflow:hidden;
    padding:20px;
  }

  .container{
    width:100%;
    max-width:100%;
    padding:0 10px;
  }

  .avatar{

    width:220px;

    max-width:85%;

    margin:auto;

    display:block;

  }

  h1{

    font-size:34px;

    margin-top:15px;

    line-height:1.3;

  }

  p{

    font-size:16px;

    line-height:1.7;

    margin-top:15px;

    padding:0 5px;

  }

  .btn{

    margin-top:28px;

    padding:14px 30px;

    font-size:16px;

  }

  .heart{

    font-size:16px;

  }

}






    /* Stars */
    body::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      background:url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity:0.5;
      animation: starsMove 50s linear infinite;
    }

    @keyframes starsMove{
      from{
        transform:translateY(0);
      }
      to{
        transform:translateY(-1000px);
      }
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      width:90%;
      max-width:900px;
    }

    /* Avatar Animation */
    .avatar{
      width:350px;
      max-width:90%;
      opacity:0;
      transform:translateX(-500px) scale(0.5);
      animation: walkIn 3s ease forwards;
      filter:drop-shadow(0 0 40px #ff8cf0);
    }

    @keyframes walkIn{
      0%{
        opacity:0;
        transform:translateX(-500px) scale(0.5);
      }

      60%{
        opacity:1;
        transform:translateX(30px) scale(1.05);
      }

      100%{
        opacity:1;
        transform:translateX(0px) scale(1);
      }
    }

    h1{
      margin-top:20px;
      font-size:55px;
      background:linear-gradient(to right,#ff9cfb,#ffffff,#ffb3f7);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      opacity:0;
      animation:fadeUp 2s ease forwards;
      animation-delay:2.5s;
    }

    p{
      margin-top:20px;
      font-size:22px;
      line-height:1.8;
      color:#f5dfff;
      opacity:0;
      animation:fadeUp 2s ease forwards;
      animation-delay:3.2s;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .btn{
      display:inline-block;
      margin-top:40px;
      padding:18px 45px;
      font-size:20px;
      border:none;
      border-radius:50px;
      background:linear-gradient(45deg,#ff4fd8,#ff9af2);
      color:white;
      text-decoration:none;
      cursor:pointer;
      opacity:0;
      animation:fadeUp 2s ease forwards;
      animation-delay:4s;
      transition:0.4s;
      box-shadow:0 0 25px #ff6ae6;
      position:relative;
      overflow:hidden;
    }

    .btn:hover{
      transform:scale(1.1);
      box-shadow:0 0 40px #ffb0f7;
    }

    .btn::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.2);
      top:0;
      left:-100%;
      transition:0.5s;
    }

    .btn:hover::before{
      left:100%;
    }

    /* Floating Hearts */
    .heart{
      position:absolute;
      color:#ff7be5;
      font-size:20px;
      animation: float 10s linear infinite;
      opacity:0.7;
    }

    @keyframes float{
      from{
        transform:translateY(100vh) scale(0.5);
      }
      to{
        transform:translateY(-120vh) scale(1.5);
      }
    }

  </style>
</head>

<body>

  <!-- Floating Hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;">💖</div>
  <div class="heart" style="left:25%; animation-delay:2s;">✨</div>
  <div class="heart" style="left:40%; animation-delay:4s;">💜</div>
  <div class="heart" style="left:60%; animation-delay:1s;">💫</div>
  <div class="heart" style="left:75%; animation-delay:5s;">💖</div>
  <div class="heart" style="left:90%; animation-delay:3s;">✨</div>

  <div class="container">

    <!-- PNG Avatar -->
    <img src="avatar.png" class="avatar">

    <h1>Kammo Jaan ✨</h1>

    <p>
      Some memories are not just memories... <br>
      They become a part of the soul. 💖 <br><br>

      And the most beautiful memories of my life... <br>
      are the memories of <b>Kammo</b>. ✨
    </p>

    <a href="kammo1.html" class="btn">
      View Our Memories 💕
    </a>

  </div>

</body>
</html>
