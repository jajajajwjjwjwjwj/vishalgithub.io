<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kammo Happiness 💖</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(to bottom,#180022,#32004d,#090010);
      color:white;
      position:relative;
    }

    /* STARS */

    body::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      background:url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity:0.35;
      animation:stars 80s linear infinite;
    }

    @keyframes stars{

      from{
        transform:translateY(0);
      }

      to{
        transform:translateY(-1000px);
      }

    }

    .container{
      width:90%;
      max-width:760px;
      text-align:center;
      position:relative;
      z-index:5;
    }

    /* VIDEO */

    video{

      width:100%;
      max-width:430px;

      border-radius:25px;

      opacity:0;

      transform:
      scale(0.7)
      translateY(100px);

      animation:showvideo 2.8s ease forwards;

      box-shadow:
      0 0 25px #ff75e8,
      0 0 60px #ffb7f8;

    }

    @keyframes showvideo{

      0%{
        opacity:0;

        transform:
        scale(0.7)
        translateY(100px);
      }

      100%{
        opacity:1;

        transform:
        scale(1)
        translateY(0);
      }

    }

    h1{

      margin-top:25px;

      font-size:35px;

      line-height:1.6;

      background:
      linear-gradient(to right,#ff9dea,#ffffff,#ffbdf8);

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:2s;

    }

    p{

      margin-top:18px;

      font-size:18px;

      line-height:1.8;

      color:#f6deff;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:2.8s;

    }

    @keyframes fade{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* BUTTON */

    .btn{

      display:inline-block;

      margin-top:35px;

      padding:15px 40px;

      border-radius:50px;

      text-decoration:none;

      color:white;

      font-size:18px;

      background:
      linear-gradient(45deg,#ff4fd8,#ff98f3);

      box-shadow:
      0 0 20px #ff7ceb;

      transition:0.4s;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:3.5s;

    }

    .btn:hover{

      transform:scale(1.1);

      box-shadow:
      0 0 40px #ffb6f8;

    }

    /* FLOATING FLOWERS */

    .flower{
      position:absolute;
      font-size:24px;
      animation:fall 12s linear infinite;
      opacity:0.8;
    }

    @keyframes fall{

      from{
        transform:translateY(-100px) rotate(0deg);
      }

      to{
        transform:translateY(120vh) rotate(360deg);
      }

    }

  </style>

</head>

<body>

  <!-- FLOWERS -->

  <div class="flower" style="left:8%; animation-delay:0s;">🌸</div>
  <div class="flower" style="left:20%; animation-delay:2s;">🌺</div>
  <div class="flower" style="left:35%; animation-delay:4s;">💮</div>
  <div class="flower" style="left:55%; animation-delay:1s;">🌸</div>
  <div class="flower" style="left:72%; animation-delay:3s;">🌺</div>
  <div class="flower" style="left:88%; animation-delay:5s;">💮</div>

  <div class="container">

    <!-- VIDEO -->

    <video autoplay muted loop controls>

      <source src="naanihouse.mp4" type="video/mp4">

    </video>

    <h1>

      Kammo Jaan Full moj leti hui naani k ghar pe 😭💖✨

    </h1>

    <p>

      Seeing you happy like this...
      honestly makes my heart smile too. 🥺💕

    

      <br><br>

      Aur sach bolu...
      ek din chal basunga tujhe dekhte dekhte 😭

    </p>

    <!-- NEXT BUTTON -->

    <a href="5th.html" class="btn">

      One More 💞

    </a>

  </div>

</body>
</html>
