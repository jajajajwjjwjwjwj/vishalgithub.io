<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kammo Video 💖</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(to bottom,#14001f,#2a0044,#07000d);
      position:relative;
      color:white;
    }

    /* STARS */

    body::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      background:url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity:0.35;
      animation:stars 70s linear infinite;
    }

    @keyframes stars{

      from{
        transform:translateY(0);
      }

      to{
        transform:translateY(-1000px);
      }

    }

    .container{
      width:90%;
      max-width:750px;
      text-align:center;
      position:relative;
      z-index:5;
    }

    /* VIDEO */

    video{

      width:100%;
      max-width:420px;

      border-radius:25px;

      opacity:0;

      transform:
      translateY(100px)
      scale(0.7);

      animation:videoentry 2.8s ease forwards;

      box-shadow:
      0 0 25px #ff73e7,
      0 0 60px #ffb3f7;

    }

    @keyframes videoentry{

      0%{
        opacity:0;

        transform:
        translateY(100px)
        scale(0.7);
      }

      100%{
        opacity:1;

        transform:
        translateY(0)
        scale(1);
      }

    }

    h1{

      margin-top:25px;

      font-size:36px;

      line-height:1.6;

      background:
      linear-gradient(to right,#ff9cea,#ffffff,#ffbaf8);

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:2s;

    }

    p{

      margin-top:18px;

      font-size:18px;

      line-height:1.8;

      color:#f6deff;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:2.8s;

    }

    @keyframes fade{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* BUTTON */

    .btn{

      display:inline-block;

      margin-top:35px;

      padding:15px 40px;

      border-radius:50px;

      text-decoration:none;

      color:white;

      font-size:18px;

      background:
      linear-gradient(45deg,#ff4fd8,#ff94f2);

      box-shadow:
      0 0 20px #ff7cea;

      transition:0.4s;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:3.5s;

    }

    .btn:hover{

      transform:scale(1.1);

      box-shadow:
      0 0 40px #ffb7f8;

    }

    /* FLOATING HEARTS */

    .heart{
      position:absolute;
      font-size:22px;
      animation:float 10s linear infinite;
      opacity:0.8;
    }

    @keyframes float{

      from{
        transform:translateY(100vh) rotate(0deg);
      }

      to{
        transform:translateY(-120vh) rotate(360deg);
      }

    }

  </style>

</head>

<body>

  <!-- HEARTS -->

  <div class="heart" style="left:8%; animation-delay:0s;">💖</div>
  <div class="heart" style="left:20%; animation-delay:2s;">💕</div>
  <div class="heart" style="left:35%; animation-delay:4s;">✨</div>
  <div class="heart" style="left:55%; animation-delay:1s;">💘</div>
  <div class="heart" style="left:72%; animation-delay:3s;">🥺</div>
  <div class="heart" style="left:88%; animation-delay:5s;">💞</div>

  <div class="container">

    <!-- VIDEO -->

    <video autoplay muted loop controls>

      <source src="kammovid.mp4" type="video/mp4">

    </video>

    <h1>

      ye tote ka mein baap hun, hna kammo jaan?... 🥺💖

    </h1>

    <p>

      mujhse jyada maje to ye tote lera ... 🥺💘


      <br><br>

      is tote ki mein gaand maar dunga. 😭

    </p>

    <!-- NEXT BUTTON -->

    <a href="4th.html" class="btn">

      Next Surprise 💞

    </a>

  </div>

</body>
</html>
