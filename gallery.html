<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kammo Gallery 💖</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
      background:
      linear-gradient(to bottom,#14001f,#2a0046,#07000d);
      color:white;
      position:relative;
      padding:40px 20px;
    }

    /* STARS */

    body::before{
      content:'';
      position:fixed;
      width:100%;
      height:100%;
      top:0;
      left:0;
      background:url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity:0.3;
      z-index:0;
      animation:stars 70s linear infinite;
    }

    @keyframes stars{

      from{
        transform:translateY(0);
      }

      to{
        transform:translateY(-1000px);
      }

    }

    .container{
      position:relative;
      z-index:5;
      max-width:950px;
      margin:auto;
      text-align:center;
    }

    h1{

      font-size:45px;

      margin-bottom:20px;

      background:
      linear-gradient(to right,#ff9de9,#ffffff,#ffbdf8);

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      animation:glow 2s infinite alternate;

    }

    @keyframes glow{

      from{
        filter:drop-shadow(0 0 5px #ff8be9);
      }

      to{
        filter:drop-shadow(0 0 20px #ffb4f7);
      }

    }

    /* GALLERY */

    .gallery{

      display:grid;

      grid-template-columns:repeat(2,1fr);

      gap:20px;

      margin-top:40px;

    }
    /* BUTTON */

.btn{

  display:inline-block;

  margin-top:40px;

  padding:15px 40px;

  border-radius:50px;

  text-decoration:none;

  color:white;

  font-size:18px;

  background:
  linear-gradient(45deg,#ff4fd8,#ff94f2);

  box-shadow:
  0 0 20px #ff7cea;

  transition:0.4s;

  opacity:0;

  animation:fade 2s ease forwards;
  animation-delay:3.8s;

}

.btn:hover{

  transform:scale(1.1);

  box-shadow:
  0 0 40px #ffb7f8;

}

    .gallery img{

      width:100%;
      height:260px;

      object-fit:cover;

      border-radius:22px;

      opacity:0;

      box-shadow:
      0 0 20px #ff7ce8,
      0 0 45px #ffb3f7;

      transition:0.4s;

    }

    .gallery img:hover{

      transform:scale(1.04);

    }

    /* ANIMATIONS */

    .img1{animation:left 1.5s ease forwards; animation-delay:0.2s;}
    .img2{animation:right 1.5s ease forwards; animation-delay:0.4s;}
    .img3{animation:top 1.5s ease forwards; animation-delay:0.6s;}
    .img4{animation:bottom 1.5s ease forwards; animation-delay:0.8s;}
    .img5{animation:left 1.5s ease forwards; animation-delay:1s;}
    .img6{animation:right 1.5s ease forwards; animation-delay:1.2s;}
    .img7{animation:top 1.5s ease forwards; animation-delay:1.4s;}
    .img8{animation:bottom 1.5s ease forwards; animation-delay:1.6s;}
    .img9{animation:left 1.5s ease forwards; animation-delay:1.8s;}
    .img10{animation:right 1.5s ease forwards; animation-delay:2s;}
    .img11{animation:top 1.5s ease forwards; animation-delay:2.2s;}
    .img12{animation:bottom 1.5s ease forwards; animation-delay:2.4s;}
    .img13{animation:left 1.5s ease forwards; animation-delay:2.6s;}

    @keyframes left{

      from{
        opacity:0;
        transform:translateX(-250px) rotate(-10deg);
      }

      to{
        opacity:1;
        transform:translateX(0) rotate(0);
      }

    }

    @keyframes right{

      from{
        opacity:0;
        transform:translateX(250px) rotate(10deg);
      }

      to{
        opacity:1;
        transform:translateX(0) rotate(0);
      }

    }

    @keyframes top{

      from{
        opacity:0;
        transform:translateY(-250px) scale(0.7);
      }

      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }

    }

    @keyframes bottom{

      from{
        opacity:0;
        transform:translateY(250px) scale(0.7);
      }

      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }

    }

    /* TEXT */

    p{

      margin-top:50px;

      font-size:22px;

      line-height:1.9;

      color:#f7ddff;

      opacity:0;

      animation:fade 2s ease forwards;
      animation-delay:3.2s;

    }

    @keyframes fade{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* FLOWERS */

    .flower{
      position:fixed;
      top:-50px;
      font-size:22px;
      animation:fall 12s linear infinite;
      z-index:1;
      opacity:0.8;
    }

    @keyframes fall{

      from{
        transform:translateY(-100px) rotate(0deg);
      }

      to{
        transform:translateY(120vh) rotate(360deg);
      }

    }

  </style>

</head>
